name: CI

# Unless we are on the main branch, the workflow should stop and yield to a new run if new code is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }} # allow concurrency on main by setting the concurrency group to the commit hash
  cancel-in-progress: ${{ !contains(github.ref, 'main')}} # Code pushed to PRs will cancel previous workflows, while all code pushed to the main branch will trigger a new workflow

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  version-alignment:
    name: Version Alignment
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/version-alignment
        with:
          uniffi_version: ${{ vars.UNIFFI_VERSION }}
          rust_toolchain_channel: ${{ vars.RUST_TOOLCHAIN_CHANNEL }}

  lint:
    name: Format, Clippy & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Check code formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Build
        run: cargo build

      - name: Check TOML formatting
        run: |
          cargo install taplo-cli
          taplo fmt --check

  swift-build:
    name: Build Swift
    runs-on: macos-26
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios-sim,aarch64-apple-ios,x86_64-apple-ios

      - name: Build Swift bindings
        run: cargo xtask swift build

      - name: Upload Swift build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bedrock-swift-build
          path: |
            swift/Bedrock.xcframework
            swift/Sources/Bedrock
          retention-days: 1

  swift-test:
    name: Swift Foreign Binding Tests (Xcode ${{ matrix.xcode-version }})
    needs: swift-build
    runs-on: macos-26
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # Update as GitHub's runner image adds/drops Xcode versions:
        # actions/runner-images macos-26-arm64-Readme.md. If a version fails
        # with a missing-SDK/platform error, just drop it from this list.
        xcode-version:
          - "26.2"
          - "26.3"
          - "26.4.1"
          - "26.5"
          - "26.6"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode-version }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode-version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Download Swift build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bedrock-swift-build
          path: swift

      - name: Run Swift foreign binding tests
        run: cargo xtask swift run-tests

      - name: Install SwiftLint
        run: |
          brew install swiftlint

      - name: Lint Swift Tests
        run: swiftlint swift/tests

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Add forge to PATH
        run: echo "FORGE_BIN=$(which forge)" >> $GITHUB_ENV

      - name: Run tests
        env:
          # Details in http://go/rpc-ci-account (`bedrock` app)
          WORLDCHAIN_RPC_URL: ${{ secrets.WORLDCHAIN_RPC_URL || 'https://worldchain-mainnet.g.alchemy.com/public' }}
        run: |
          cp .env.example .env
          cargo test --all --features test_utils

  deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources

    continue-on-error: ${{ matrix.checks == 'advisories' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
          rust-version: stable

  kotlin-build-and-test:
    name: Build and Test Kotlin Bindings
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build and test Kotlin bindings
        run: cargo xtask kotlin test

      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/latest/download/ktlint &&
          chmod a+x ktlint &&
          sudo mv ktlint /usr/local/bin/

      - name: Lint Kotlin Tests
        run: |

          ktlint kotlin/src/test
